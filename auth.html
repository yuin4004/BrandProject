<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 / 회원가입 — 30일 챌린지</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:  #F4EFE6;
      --neon:   #CCFF00;
      --dark:   #0D0D12;
      --ink:    #111111;
      --muted:  #6A6A6A;
      --border: #E0D9CF;
      --white:  #FFFFFF;
      --error:  #FF4444;
      --success: #22c55e;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── 로고 영역 ── */
    .logo-area {
      margin-bottom: 32px;
      text-align: center;
    }
    .logo-text {
      font-size: 14px;
      font-weight: 900;
      color: var(--neon);
      letter-spacing: -0.3px;
    }
    .logo-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      margin-top: 4px;
    }

    /* ── 카드 ── */
    .auth-card {
      background: #16161f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 420px;
    }

    /* ── 탭 ── */
    .tabs {
      display: flex;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 32px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 9px 0;
      font-size: 14px;
      font-weight: 700;
      border-radius: 7px;
      cursor: pointer;
      color: rgba(255,255,255,0.4);
      transition: all 0.2s;
      user-select: none;
    }
    .tab.active {
      background: var(--neon);
      color: var(--dark);
    }

    /* ── 폼 ── */
    .form-section { display: none; }
    .form-section.active { display: block; }

    .form-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 15px;
      font-family: inherit;
      color: var(--white);
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--neon); }
    .form-input::placeholder { color: rgba(255,255,255,0.2); }

    .form-group { margin-bottom: 4px; }

    .btn-submit {
      width: 100%;
      background: var(--neon);
      color: var(--dark);
      font-size: 15px;
      font-weight: 900;
      padding: 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.15s;
      margin-top: 8px;
    }
    .btn-submit:hover { background: #b8f000; transform: translateY(-1px); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── 메시지 ── */
    .msg {
      font-size: 13px;
      padding: 12px 14px;
      border-radius: 8px;
      margin-top: 14px;
      display: none;
    }
    .msg.error {
      background: rgba(255,68,68,0.1);
      border: 1px solid rgba(255,68,68,0.25);
      color: #ff8888;
    }
    .msg.success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      color: #86efac;
    }

    /* ── 비밀번호 찾기 ── */
    .forgot-link {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      display: block;
      text-align: right;
      margin-top: -10px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .forgot-link:hover { color: rgba(255,255,255,0.6); }

    /* ── 구분선 ── */
    .divider {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      margin: 20px 0 0;
    }
    .divider a {
      color: var(--neon);
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }
    .divider a:hover { text-decoration: underline; }

    /* ── 돌아가기 ── */
    .back-link {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.25);
    }
    .back-link a {
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link a:hover { color: rgba(255,255,255,0.7); }

    /* ── 비밀번호 토글 ── */
    .pw-wrapper {
      position: relative;
    }
    .pw-wrapper .form-input {
      padding-right: 44px;
    }
    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      margin-top: -8px;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.3);
      font-size: 16px;
      padding: 0;
      line-height: 1;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: rgba(255,255,255,0.6); }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 24px 24px; }
    }
  </style>
</head>
<body>

  <div class="logo-area">
    <div class="logo-text">30일 챌린지</div>
    <div class="logo-sub">첫 런칭과 콘텐츠 구축</div>
  </div>

  <div class="auth-card">
    <!-- 탭 -->
    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">로그인</div>
      <div class="tab" id="tab-signup" onclick="switchTab('signup')">회원가입</div>
    </div>

    <!-- 로그인 폼 -->
    <div class="form-section active" id="section-login">
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" id="login-email" class="form-input" placeholder="이메일 주소 입력" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <div class="pw-wrapper">
          <input type="password" id="login-pw" class="form-input" placeholder="비밀번호 입력" autocomplete="current-password">
          <button class="pw-toggle" type="button" onclick="togglePw('login-pw', this)">👁</button>
        </div>
      </div>
      <span class="forgot-link" onclick="showForgot()">비밀번호를 잊으셨나요?</span>
      <button class="btn-submit" id="btn-login" onclick="doLogin()">로그인</button>
      <div class="msg" id="login-msg"></div>
      <div class="divider">계정이 없으신가요? <a onclick="switchTab('signup')">회원가입</a></div>
    </div>

    <!-- 회원가입 폼 -->
    <div class="form-section" id="section-signup">
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" id="signup-email" class="form-input" placeholder="이메일 주소 입력" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <div class="pw-wrapper">
          <input type="password" id="signup-pw" class="form-input" placeholder="8자 이상 입력" autocomplete="new-password">
          <button class="pw-toggle" type="button" onclick="togglePw('signup-pw', this)">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 확인</label>
        <div class="pw-wrapper">
          <input type="password" id="signup-pw2" class="form-input" placeholder="비밀번호 재입력" autocomplete="new-password">
          <button class="pw-toggle" type="button" onclick="togglePw('signup-pw2', this)">👁</button>
        </div>
      </div>
      <button class="btn-submit" id="btn-signup" onclick="doSignup()">회원가입</button>
      <div class="msg" id="signup-msg"></div>
      <div class="divider">이미 계정이 있으신가요? <a onclick="switchTab('login')">로그인</a></div>
    </div>
  </div>

  <div class="back-link">
    <a href="index.html">← 메인으로 돌아가기</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://sfuhqyxcaqyhxihehomr.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_kqW-fJD1-GS6sgQoDn02rw_ck1gN8IR';
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 이미 로그인된 경우 members 페이지로
    client.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'members.html';
    });

    // ── 탭 전환 ──
    function switchTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      document.getElementById('section-login').classList.toggle('active', tab === 'login');
      document.getElementById('section-signup').classList.toggle('active', tab === 'signup');
    }

    // ── 비밀번호 보기/숨기기 ──
    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }

    // ── 메시지 표시 ──
    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + type;
      el.style.display = 'block';
    }
    function hideMsg(id) {
      document.getElementById(id).style.display = 'none';
    }

    // ── 엔터키 ──
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const loginActive = document.getElementById('section-login').classList.contains('active');
      if (loginActive) doLogin();
      else doSignup();
    });

    // ── 로그인 ──
    async function doLogin() {
      hideMsg('login-msg');
      const email = document.getElementById('login-email').value.trim();
      const pw    = document.getElementById('login-pw').value;
      if (!email || !pw) {
        showMsg('login-msg', '이메일과 비밀번호를 모두 입력해주세요.', 'error');
        return;
      }
      const btn = document.getElementById('btn-login');
      btn.disabled = true;
      btn.textContent = '로그인 중...';

      const { error } = await client.auth.signInWithPassword({ email, password: pw });

      if (error) {
        let msg = '로그인에 실패했습니다.';
        if (error.message.includes('Invalid login')) msg = '이메일 또는 비밀번호가 올바르지 않습니다.';
        else if (error.message.includes('Email not confirmed')) msg = '이메일 인증을 완료해주세요. 받은 편지함을 확인하세요.';
        showMsg('login-msg', msg, 'error');
        btn.disabled = false;
        btn.textContent = '로그인';
      } else {
        window.location.href = 'members.html';
      }
    }

    // ── 회원가입 ──
    async function doSignup() {
      hideMsg('signup-msg');
      const email = document.getElementById('signup-email').value.trim();
      const pw    = document.getElementById('signup-pw').value;
      const pw2   = document.getElementById('signup-pw2').value;

      if (!email || !pw || !pw2) {
        showMsg('signup-msg', '모든 항목을 입력해주세요.', 'error');
        return;
      }
      if (pw.length < 8) {
        showMsg('signup-msg', '비밀번호는 8자 이상이어야 합니다.', 'error');
        return;
      }
      if (pw !== pw2) {
        showMsg('signup-msg', '비밀번호가 일치하지 않습니다.', 'error');
        return;
      }

      const btn = document.getElementById('btn-signup');
      btn.disabled = true;
      btn.textContent = '가입 처리 중...';

      const { error } = await client.auth.signUp({ email, password: pw });

      if (error) {
        let msg = '회원가입에 실패했습니다.';
        if (error.message.includes('already registered')) msg = '이미 가입된 이메일입니다. 로그인을 시도해보세요.';
        else if (error.message.includes('Password')) msg = '비밀번호는 8자 이상이어야 합니다.';
        showMsg('signup-msg', msg, 'error');
        btn.disabled = false;
        btn.textContent = '회원가입';
      } else {
        window.location.href = 'members.html';
      }
    }

    // ── 비밀번호 찾기 ──
    async function showForgot() {
      const email = document.getElementById('login-email').value.trim();
      if (!email) {
        showMsg('login-msg', '이메일을 먼저 입력한 후 클릭해주세요.', 'error');
        return;
      }
      const { error } = await client.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/auth.html#reset'
      });
      if (error) {
        showMsg('login-msg', '재설정 메일 발송에 실패했습니다.', 'error');
      } else {
        showMsg('login-msg', `${email} 으로 비밀번호 재설정 메일을 발송했습니다.`, 'success');
      }
    }

    // ── 비밀번호 재설정 처리 (이메일 링크 클릭 후) ──
    if (window.location.hash === '#reset') {
      // Supabase가 URL fragment에 토큰을 넣어줌 — 세션 자동 복원됨
      client.auth.onAuthStateChange((event) => {
        if (event === 'PASSWORD_RECOVERY') {
          const newPw = prompt('새 비밀번호를 입력하세요 (8자 이상):');
          if (newPw && newPw.length >= 8) {
            client.auth.updateUser({ password: newPw }).then(({ error }) => {
              if (error) alert('비밀번호 변경 실패: ' + error.message);
              else {
                alert('비밀번호가 변경되었습니다. 다시 로그인해주세요.');
                window.location.href = 'auth.html';
              }
            });
          }
        }
      });
    }
  </script>
</body>
</html>
